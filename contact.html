<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/apple-animations.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body class="apple-fade-in">
    
    <nav class="top-bar apple-fade-up">
        <a href="index.html" class="logo">kayzzeen</a>
        <div class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="contact.html" class="nav-item active">Contact</a>
        </div>
    </nav>

    <main class="contact-page">
        <div class="contact-header">
            <h1 class="social-h1">Social Media</h1>
            <div class="social-links-row">
                <a href="https://www.instagram.com/kayzzeen?igsh=MW12YnJleno3MDAwdg%3D%3D&utm_source=qr" target="_blank" class="social-link-item">Instagram</a>
                <a href="https://www.tiktok.com/@kayzen.spott" target="_blank" class="social-link-item">TikTok</a>
            </div>
        </div>

        <form action="https://formspree.io/f/mlgkrenj" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="_replyto" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Your message..." required></textarea>
            </div>

            <button type="submit" class="form-submit-btn">Send Message</button>
        </form>
    </main>
    
</body>
</html>
